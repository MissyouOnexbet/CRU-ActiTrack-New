<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyTrack — Activity Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="app-shell">
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" onclick="showScreen('dashboard', this)" role="tab" aria-selected="true">📊 Dashboard</button>
    <button class="tab-btn" onclick="showScreen('log', this)" role="tab" aria-selected="false">➕ Log Activity</button>
  </nav>

  <div class="screen active" id="screen-dashboard">
    <p class="greeting">Good day, student 👋</p>
    <h1 class="screen-title">YOUR PROGRESS</h1>

    <div class="summary-card">
      <div class="card-label">Total Hours Logged</div>
      <div class="card-hours" id="total-hours">0<span>hrs</span></div>
      <div class="card-sub">
        <div><b id="total-activities">0</b> activities</div>
        <div>This week: <b id="week-hours">0</b> hrs</div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">Recent Activities</span>
      <span class="section-count" id="activity-count">0 entries</span>
    </div>

    <div class="activity-list" id="activity-list">
      </div>
  </div>

  <div class="screen" id="screen-log">
    <h1 class="form-title">LOG ACTIVITY</h1>
    <div class="field-group">
      <label for="activity-name">Activity Name</label>
      <input type="text" id="activity-name" placeholder="e.g. Math Study..." />
      <p class="error-msg" id="name-err">Please enter an activity name.</p>
    </div>

    <div class="field-group">
      <label for="activity-date">Date</label>
      <input type="date" id="activity-date" />
    </div>

    <div class="field-group">
      <label for="activity-hours-input">Hours Spent</label>
      <input type="number" id="activity-hours-input" step="0.5" />
      <div class="hours-hint">
        <span class="hint-chip" onclick="setHours(0.5)">½ hr</span>
        <span class="hint-chip" onclick="setHours(1)">1 hr</span>
        <span class="hint-chip" onclick="setHours(2)">2 hrs</span>
      </div>
    </div>

    <button class="save-btn" id="save-btn" onclick="saveActivity(event)">SAVE ACTIVITY</button>
  </div>
</div>

<div class="toast" id="toast">✅ Activity saved!</div>

</body>
</html>
